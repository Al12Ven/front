    <div class="container text-center">

				<div class="col-sm-2 col-md-4 myblock">Колонка</div>

			<h1>Форма регистрации</h1>
			<div class="container">
				<div class="row">
					<form method="post" action="" name="form_reg" id="form_reg">
						<div class="mb-3">
							<label for="nickname" class="form-label">Ваш никнейм</label>
							<input
								type="text"
								class="form-control"
								id="name"
								name="name"
								aria-describedby="nicknameHelp"
							/>
							<div id="nicknameHelp" class="form-text">
								Мы никогда никому не передадим ваши данные.
							</div>
						</div>
						<div class="mb-3">
							<label for="exampleInputInt" class="form-label"
								>Пароль</label
							>
							<input
								type="int"
								class="form-control"
								id="exampleInputInt"
								name="exampleInputInt"
							/>
						</div>
						<div class="mb-3 form-check">
							<input
								type="checkbox"
								class="form-check-input"
								id="exampleCheck1"
								name="exampleCheck1"
							/>
							<label class="form-check-label" for="exampleCheck1"
								>Соглашаетесь со всеми нашими условиями</label
							>
						</div>
						<button
							type="submit"
							name="btn_reg"
							id="btn_reg"
							class="btn btn-primary"
						>
							Отправить
						</button>
					</form>
				</div>
